<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万物有灵 - 历代图像志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #d4d4d4; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cea262; border-radius: 2px; }
        
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }
        
        /* 异兽卡片高级效果 */
        .creature-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; filter: grayscale(40%); }
        .creature-card:hover { filter: grayscale(0%); transform: translateY(-10px); }
        .creature-card::after { content: ''; position: absolute; inset: 0; border: 1px solid rgba(206, 162, 98, 0); transition: all 0.5s; }
        .creature-card:hover::after { border: 1px solid rgba(206, 162, 98, 0.5); inset: -8px; }

        /* 弹窗动画 */
        #creature-modal.hidden { display: none; }
        #creature-modal.flex { display: flex; animation: modal-in 0.4s ease-out forwards; }
        @keyframes modal-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="w-screen h-screen flex">

   <canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 20000;"></canvas>

    <!-- ================= 1. 左侧：分类导航 (30%) ================= -->
    <aside class="w-[25%] md:w-[20%] h-full border-r border-neutral-800 bg-[#0a0a0a]/90 backdrop-blur-sm z-20 flex flex-col p-8 overflow-y-auto custom-scrollbar relative">

            <a href="index.html" class="text-sm tracking-[0.3em] text-[#cea262] mb-8 inline-block hover:text-white transition border-b border-[#cea262]/30 pb-1">← 返回序厅</a>
            <h1 class="text-4xl font-bold tracking-widest text-white mb-2">万物有灵</h1>

        </div>

            <button onclick="filterItems('deity')" class="filter-btn block text-left text-neutral-500 hover:text-[#cea262] transition tracking-widest text-lg w-full">神 祇 · DEITIES</button>
            <button onclick="filterItems('folklore')" class="filter-btn block text-left text-neutral-500 hover:text-[#cea262] transition tracking-widest text-lg w-full">民 俗 · FOLKLORE</button>
        </nav>

        <div class="mt-auto text-[10px] text-neutral-600 leading-relaxed italic border-t border-neutral-800 pt-6">
            “广博神州，诡谲万状。<br>图谱所录，皆先民之精魄。”
        </div>
    </aside>

    <!-- ================= 2. 右侧：非对称瀑布流画廊 (70%) ================= -->
    <main class="w-[75%] md:w-[80%] h-full overflow-y-auto custom-scrollbar p-10 md:p-20 relative bg-[#050505] z-10">
        <!-- 画廊容器：使用多列布局实现瀑布流 -->
        <div id="gallery-container" class="columns-1 md:columns-2 lg:columns-3 gap-8 space-y-8">
            <!-- 卡片由 JavaScript 动态生成 -->
        </div>
    </main>

    <!-- ================= 3. 全屏深度档案弹窗 (Modal) ================= -->

        <div class="bg-neutral-900 border border-[#cea262]/30 w-full max-w-7xl h-full md:h-[85vh] flex flex-col md:flex-row rounded-lg overflow-hidden shadow-2xl relative">
            
            <!-- 关闭按钮 -->
            <button onclick="closeModal()" class="absolute top-6 right-6 text-neutral-500 hover:text-white transition text-3xl z-[10001]">✕</button>

            <!-- 弹窗左侧：图像演变流变区 (占宽 60%) -->

                <h4 class="text-[#cea262] text-xs tracking-widest mb-6">〈 历代影像流变 · VISUAL EVOLUTION 〉</h4>
                <!-- 滚动图片容器 -->
                <div id="modal-image-gallery" class="flex gap-6 overflow-x-auto custom-scrollbar pb-6 h-full items-center">
                    <!-- 图片由 JS 动态填充 -->
                </div>
                <p class="text-[10px] text-neutral-500 mt-4 tracking-widest text-center">鼠标滚轮可左右滑动查看演变</p>
            </div>

            <div class="w-full md:w-2/5 h-1/2 md:h-full p-10 flex flex-col overflow-y-auto custom-scrollbar bg-[#0d0d0d]">
                <span id="modal-type" class="text-amber-600 text-xs tracking-[0.3em] uppercase mb-2">瑞兽</span>

                <div class="space-y-8">
                    <div>

                        <p id="modal-desc" class="text-neutral-300 leading-loose text-sm font-light"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        // --- 生成画廊卡片 ---
        const container = document.getElementById('gallery-container');

        function renderGallery(items) {
            container.innerHTML = '';
            items.forEach(c => {
                const card = document.createElement('div');
                card.className = `creature-card relative break-inside-avoid bg-neutral-900 overflow-hidden group mb-8 rounded-lg`;
                card.setAttribute('data-type', c.type);
                card.onclick = () => openModal(c);
                card.innerHTML = `
                    <img src="${c.mainImg}" class="w-full h-auto object-cover group-hover:scale-105 transition duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-100 p-6 flex flex-col justify-end">
                        <span class="text-[#cea262] text-[10px] tracking-widest uppercase mb-2">${c.typeText}</span>
                        <h3 class="text-2xl font-bold text-white tracking-widest">${c.name}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        renderGallery(creatures);

        // --- 筛选功能 ---
        function filterItems(type) {
            // 更新按钮样式
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.replace('text-[#cea262]', 'text-neutral-500');
            });
            event.target.classList.replace('text-neutral-500', 'text-[#cea262]');

            if (type === 'all') {
                renderGallery(creatures);
            } else {
                renderGallery(creatures.filter(c => c.type === type));
            }
        }

        // --- 弹窗逻辑 ---
        const modal = document.getElementById('creature-modal');
        function openModal(c) {
            document.getElementById('modal-title').textContent = c.name;
            document.getElementById('modal-type').textContent = c.typeText;
            document.getElementById('modal-desc').textContent = c.desc;
            
            const imgContainer = document.getElementById('modal-image-gallery');
            imgContainer.innerHTML = '';
            c.images.forEach(img => {
                imgContainer.innerHTML += `
                    <div class="flex-shrink-0 w-80 h-full flex flex-col group">
                        <div class="h-4/5 overflow-hidden border border-neutral-800">
                            <img src="${img.src}" class="w-full h-full object-contain group-hover:scale-110 transition duration-1000">
                        </div>
                        <div class="mt-4">
                            <p class="text-white text-sm font-bold tracking-widest">${img.label}</p>
                            <p class="text-[#cea262] text-[10px] uppercase mt-1">时代：${img.era}</p>
                        </div>
                    </div>
                `;
            });

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        // --- 金色粒子特效 (全局统一) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let particles = [];
        let mouse = { x: null, y: null };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            for (let i = 0; i < 2; i++) particles.push(new Particle());
        });
        class Particle {
            constructor() {
                this.x = mouse.x; this.y = mouse.y;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.life = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.02; }
            draw() {
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = `rgba(206, 162, 98, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
