<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南海·大荒南经 - 山海志怪</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入思源宋体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #d4d4d4; overflow: hidden; }
        
        /* 优雅的滚动条 (南海专属赤红色) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f87171; border-radius: 2px; } 
        
        /* 🔴 南海专属：赤红色火系呼吸光点 */
        .dot-nanhai { animation: ping-red 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping-red { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(248, 113, 113, 0); } 
        }

        /* 坐标点悬停放大效果 */
        .marker-group { transition: transform 0.3s ease; cursor: pointer; }
        .marker-group:hover { transform: translate(-50%, -50%) scale(1.3) !important; z-index: 50; }
        .marker-label { transition: opacity 0.3s ease; }
        .marker-group:hover .marker-label { opacity: 1; }
    </style>
</head>
<body class="w-screen h-screen flex relative">
    <canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999;"></canvas>
    <!-- ================= 1. 左侧：文本与介绍区 (占宽 30%) ================= -->
    <aside class="w-[30%] h-full border-r border-red-900/30 bg-[#0a0a0a] flex flex-col p-10 z-20 shadow-[5px_0_30px_rgba(0,0,0,0.8)]">
        
        <!-- 返回按钮 -->
        <a href="map.html" class="text-sm tracking-[0.2em] text-red-500 mb-12 inline-block hover:text-white transition border-b border-red-500/30 pb-1 self-start">
            ← 返回大荒罗盘
        </a>

        <!-- 标题 -->
        <div class="mb-10">
            <span class="text-xs text-red-600 tracking-[0.3em] uppercase block mb-2">区域档案 03</span>
            <h1 class="text-4xl font-bold tracking-widest text-white mb-4">南海·大荒南经</h1>
            <p class="text-sm text-neutral-500 tracking-widest">海外南经 / 炎热之域</p>
        </div>

        <!-- 区域介绍 (可滚动) -->
        <div class="flex-grow overflow-y-auto custom-scrollbar pr-4 text-sm leading-loose text-neutral-400 space-y-6">
            <p class="border-l-2 border-red-500/50 pl-4 text-neutral-300">
                南海之外，有羲和之国，女子名羲和，生十日，浴于甘渊。南方属火，色赤，多炎热之地。有厌火国民，兽身黑色，口中吐火。
            </p>
            <p>
                此地多奇人异士，或身生羽翼，或寿元无尽，或口中吐火，皆为适应南方酷烈环境而生的奇异族群。
            </p>
            <div class="p-4 bg-red-900/10 border border-red-900/30 rounded text-xs">
                <span class="text-red-500 font-bold">交互提示：</span><br>
                请在右侧局部地图上，点击赤红色火系光点，查阅对应方国与异兽卷宗。
            </div>
        </div>
    </aside>

    <!-- ================= 2. 右侧：放大版局部地图与交互点 (占宽 70%) ================= -->
    <main class="w-[70%] h-full bg-[#050505] relative p-8 flex items-center justify-center">
        
        <!-- 地图画框容器 -->
        <div class="relative w-full h-full max-w-6xl max-h-[85vh] border border-red-900/50 rounded-xl overflow-hidden shadow-2xl bg-neutral-900">
            
            <!-- [!!!需要替换!!!] 请把 src 换成你截取的南海局部放大地图 -->
            <img src="南海.png" alt="南海局部地图" class="absolute inset-0 w-full h-full object-cover opacity-60">
            
            <!-- 暗色渐变蒙版，让发光点更显眼 -->
            <div class="absolute inset-0 bg-gradient-to-b from-[#0a0a0a]/30 to-[#0a0a0a]/80 pointer-events-none"></div>

            <!-- ======== 坐标光点阵列 (南海 6 国) ======== -->
            <!-- 所有的 top 和 left 百分比都可以自由修改，以对准你地图上的具体位置 -->

            <!-- 1. 羽民国 -->
            <div class="marker-group absolute top-[20%] left-[30%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('羽民国', '羽民（鸟人）', '国民长头身生羽，人面鸟喙，能飞不能远，自身即半鸟。', '羽民国-羽民.png')">
                <div class="w-4 h-4 bg-red-400 rounded-full dot-nanhai shadow-[0_0_15px_#f87171]"></div>
                <span class="marker-label opacity-0 text-red-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【羽民国】</span>
            </div>

            <!-- 2. 讙头国 -->
            <div class="marker-group absolute top-[25%] left-[75%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('讙头国', '讙头（鸟形人）', '国民面有翼，鸟喙，以喙捕鱼，似鸟之人。', '讙头国-讙头.png')">
                <div class="w-4 h-4 bg-red-400 rounded-full dot-nanhai shadow-[0_0_15px_#f87171]"></div>
                <span class="marker-label opacity-0 text-red-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【讙头国】</span>
            </div>

            <!-- 3. 不死民 (重点标志) -->
            <div class="marker-group absolute top-[50%] left-[20%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('不死民', '无', '国民黑色，寿不死，无动物特征。图为不死民。', '不死民.png')">
                <div class="w-6 h-6 bg-white rounded-full dot-nanhai shadow-[0_0_30px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-white text-sm tracking-widest mt-2 font-bold drop-shadow-md">不死民</span>
            </div>

            <!-- 4. 厌火国 -->
            <div class="marker-group absolute top-[55%] left-[80%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('厌火国', '厌火兽', '国民兽身黑色，口中吐火，自身即兽形。', '厌火国-厌火兽.png')">
                <div class="w-4 h-4 bg-red-400 rounded-full dot-nanhai shadow-[0_0_15px_#f87171]"></div>
                <span class="marker-label opacity-0 text-red-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【厌火国】</span>
            </div>

            <!-- 5. 结匈国 -->
            <div class="marker-group absolute top-[75%] left-[35%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('结匈国', '无', '国民胸前有结，无动物关联。图为结匈国民。', '结匈国民.png')">
                <div class="w-4 h-4 bg-red-400 rounded-full dot-nanhai shadow-[0_0_15px_#f87171]"></div>
                <span class="marker-label opacity-0 text-red-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【结匈国】</span>
            </div>

            <!-- 6. 周饶国 (小人国) -->
            <div class="marker-group absolute top-[80%] left-[70%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('周饶国（小人国）', '无', '国民短小，冠带，无动物特征。图为周饶国民。', '周饶国民.png')">
                <div class="w-4 h-4 bg-red-400 rounded-full dot-nanhai shadow-[0_0_15px_#f87171]"></div>
                <span class="marker-label opacity-0 text-red-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【周饶国】</span>
            </div>

        </div>
    </main>

    <!-- ================= 3. 卷宗弹窗 (Modal) ================= -->
    <div id="dossier" class="fixed inset-0 bg-black/90 z-50 justify-center items-center p-8 hidden transition-opacity duration-300" onclick="hideDossier()">
        <div class="bg-neutral-900/90 backdrop-blur-xl border border-red-900/50 w-full max-w-4xl h-[60vh] flex rounded-lg shadow-[0_0_50px_rgba(0,0,0,1)] overflow-hidden transition-all duration-300 opacity-0 scale-95" onclick="event.stopPropagation()">
            
            <!-- 左侧：图像占位区 -->
            <div class="w-1/2 h-full bg-black relative flex justify-center items-center overflow-hidden border-r border-neutral-800">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
                <img id="dossier-image" src="" alt="志怪图像" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
            </div>

            <!-- 右侧：详细数据区 -->
            <div class="w-1/2 p-10 flex flex-col relative">
                <!-- 关闭按钮 -->
                <button onclick="hideDossier()" class="absolute top-6 right-6 text-neutral-500 hover:text-white transition text-xl">✕</button>
                
                <span class="text-red-600 text-xs tracking-[0.2em] mb-2 uppercase">大荒档案</span>
                <h3 id="dossier-title" class="text-4xl font-bold text-white mb-6 tracking-wider"></h3>
                
                <!-- 结构化数据展示 -->
                <div class="mb-6 border-b border-neutral-800 pb-4 flex gap-4">
                    <div class="bg-neutral-800 px-3 py-1 rounded text-xs text-neutral-400">
                        代表动物: <span id="dossier-animal" class="text-red-400 font-bold ml-1"></span>
                    </div>
                </div>

                <div class="flex-grow overflow-y-auto custom-scrollbar pr-2">
                    <p class="text-neutral-400 text-xs tracking-widest mb-2 border-l-2 border-red-500 pl-2">文献记载</p>
                    <p id="dossier-text" class="text-neutral-300 leading-loose text-sm"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= JavaScript 交互 ================= -->
<!-- ================= JavaScript 交互 ================= -->
    <script>
        // --- 1. 卷宗弹窗逻辑 ---
        const dossier = document.getElementById('dossier');
        const dossierTitle = document.getElementById('dossier-title');
        const dossierAnimal = document.getElementById('dossier-animal');
        const dossierText = document.getElementById('dossier-text');
        const dossierImage = document.getElementById('dossier-image');

        function showDossier(title, animal, text, imgSrc) {
            dossierTitle.textContent = title;
            dossierAnimal.textContent = animal;
            dossierText.textContent = text;
            dossierImage.src = imgSrc;
            
            dossier.classList.remove('hidden');
            dossier.classList.add('flex');
            
            setTimeout(() => {
                const contentDiv = dossier.querySelector('div');
                if(contentDiv) {
                    contentDiv.classList.add('opacity-100', 'scale-100');
                    contentDiv.classList.remove('opacity-0', 'scale-95');
                }
            }, 10);
        }

        function hideDossier() {
            const contentDiv = dossier.querySelector('div');
            if(contentDiv) {
                contentDiv.classList.add('opacity-0', 'scale-95');
                contentDiv.classList.remove('opacity-100', 'scale-100');
            }
            setTimeout(() => {
                dossier.classList.add('hidden');
                dossier.classList.remove('flex');
            }, 300);
        }

        // --- 2. 强力修复版：金色粒子跟随特效 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        // 自动适配窗口大小，确保画布铺满
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particlesArray = [];
        let mouse = { x: null, y: null };

        // 监听鼠标移动
        window.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX; // 使用 clientX/Y 获得绝对坐标
            mouse.y = event.clientY;
            // 每次移动增加粒子数量
            for (let i = 0; i < 2; i++) {
                particlesArray.push(new Particle());
            }
        });

        class Particle {
            constructor() {
                this.x = mouse.x;
                this.y = mouse.y;
                this.size = Math.random() * 3 + 1; // 粒子大小
                this.speedX = Math.random() * 2 - 1; // 横向扩散
                this.speedY = Math.random() * 2 - 1; // 纵向扩散
                this.life = 1; // 寿命
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02; // 消散速度
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; // 让重叠的金色产生亮光感
                ctx.fillStyle = `rgba(206, 162, 98, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                // 移除死亡粒子
                if (particlesArray[i].life <= 0) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
