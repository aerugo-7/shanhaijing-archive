<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西海·大荒西经 - 山海志怪</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入思源宋体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Serif SC', serif; background-color: #050505; color: #d4d4d4; overflow: hidden; }
        
        /* 优雅的滚动条 (西海专属银灰色) */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; } 
        
        /* ⚪ 西海专属：银白色金系呼吸光点 */
        .dot-xihai { animation: ping-silver 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping-silver { 
            0%, 100% { box-shadow: 0 0 0 0 rgba(226, 232, 240, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(226, 232, 240, 0); } 
        }

        /* 坐标点悬停放大效果 */
        .marker-group { transition: transform 0.3s ease; cursor: pointer; }
        .marker-group:hover { transform: translate(-50%, -50%) scale(1.3) !important; z-index: 50; }
        .marker-label { transition: opacity 0.3s ease; }
        .marker-group:hover .marker-label { opacity: 1; }
    </style>
</head>
<body class="w-screen h-screen flex relative">
    <canvas id="particle-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999;"></canvas>
    <!-- ================= 1. 左侧：文本与介绍区 (占宽 30%) ================= -->
    <aside class="w-[30%] h-full border-r border-gray-800 bg-[#0a0a0a] flex flex-col p-10 z-20 shadow-[5px_0_30px_rgba(0,0,0,0.8)]">
        
        <!-- 返回按钮 -->
        <a href="map.html" class="text-sm tracking-[0.2em] text-gray-400 mb-12 inline-block hover:text-white transition border-b border-gray-400/30 pb-1 self-start">
            ← 返回大荒罗盘
        </a>

        <!-- 标题 -->
        <div class="mb-10">
            <span class="text-xs text-gray-500 tracking-[0.3em] uppercase block mb-2">区域档案 04</span>
            <h1 class="text-4xl font-bold tracking-widest text-white mb-4">西海·大荒西经</h1>
            <p class="text-sm text-neutral-500 tracking-widest">海外西经 / 日落之域</p>
        </div>

        <!-- 区域介绍 (可滚动) -->
        <div class="flex-grow overflow-y-auto custom-scrollbar pr-4 text-sm leading-loose text-neutral-400 space-y-6">
            <p class="border-l-2 border-gray-400/50 pl-4 text-neutral-300">
                西海之外，有昆仑之丘，西王母所居。西方属金，色白，为日落之地。有刑天舞干戚，奇肱国善飞车，巫咸国群巫所从上下。
            </p>
            <p>
                西荒之地，金气肃杀而神圣。这里既有不屈的战神刑天，也有掌握通天术法的巫咸众神。昆仑之巅，更是万物神灵的交汇之所。
            </p>
            <div class="p-4 bg-gray-800/30 border border-gray-700 rounded text-xs">
                <span class="text-gray-200 font-bold">交互提示：</span><br>
                请在右侧局部地图上，点击银白色金系光点，查阅对应方国与异兽卷宗。
            </div>
        </div>
    </aside>

    <!-- ================= 2. 右侧：放大版局部地图与交互点 (占宽 70%) ================= -->
    <main class="w-[70%] h-full bg-[#050505] relative p-8 flex items-center justify-center">
        
        <!-- 地图画框容器 -->
        <div class="relative w-full h-full max-w-6xl max-h-[85vh] border border-gray-700 rounded-xl overflow-hidden shadow-2xl bg-neutral-900">
            
            <!-- [需要替换] 局部地图路径 -->
            <img src="西海.png" alt="西海局部地图" class="absolute inset-0 w-full h-full object-cover opacity-60">
            
            <!-- 暗色渐变蒙版 -->
            <div class="absolute inset-0 bg-gradient-to-b from-[#0a0a0a]/30 to-[#0a0a0a]/80 pointer-events-none"></div>

            <!-- ======== 坐标光点阵列 (西海 6 处) ======== -->

            <!-- 1. 三身国 -->
            <div class="marker-group absolute top-[20%] left-[40%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('三身国', '无', '国民一首三身，为人好让，不争。图为三身国民', '三身国民.png')">
                <div class="w-4 h-4 bg-gray-200 rounded-full dot-xihai shadow-[0_0_15px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-gray-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【三身国】</span>
            </div>

            <!-- 2. 一臂国 -->
            <div class="marker-group absolute top-[35%] left-[25%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('一臂国', '黄马', '国民一目一鼻一孔，有黄马，虎文一目。图为一臂国民。', '一臂国民.png')">
                <div class="w-4 h-4 bg-gray-200 rounded-full dot-xihai shadow-[0_0_15px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-gray-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【一臂国】</span>
            </div>

            <!-- 3. 奇肱国 (技术核心) -->
            <div class="marker-group absolute top-[55%] left-[30%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('奇肱国', '文马', '国民一臂三目，精于器械，能造飞车从风而行。', '奇肱国民.png')">
                <div class="w-4 h-4 bg-gray-200 rounded-full dot-xihai shadow-[0_0_15px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-gray-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【奇肱国】</span>
            </div>

            <!-- 4. 刑天 (战神标志) -->
            <div class="marker-group absolute top-[75%] left-[45%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('刑天', '不死之魂', '以乳为目，以脐为口，操干戚以舞，志气常在。', '刑天.png')">
                <div class="w-6 h-6 bg-white rounded-full dot-xihai shadow-[0_0_30px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-white text-sm tracking-widest mt-2 font-bold drop-shadow-md">刑天葬处</span>
            </div>

            <!-- 5. 女子国 -->
            <div class="marker-group absolute top-[80%] left-[70%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('女子国', '无', '两女子居，环以水。入黄池沐浴即孕。图为女子国民', '女子国民.png')">
                <div class="w-4 h-4 bg-gray-200 rounded-full dot-xihai shadow-[0_0_15px_#ffffff]"></div>
                <span class="marker-label opacity-0 text-gray-200 text-xs tracking-widest mt-2 font-bold drop-shadow-md">【女子国】</span>
            </div>

            <!-- 6. 西王母/昆仑丘 (最高信仰) -->
            <div class="marker-group absolute top-[40%] left-[65%] transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center"
                 onclick="showDossier('西王母', '豹尾虎齿', '司天之厉及五残。居昆仑之丘，其状如人。图为西王母。', '西王母.png')">
                <div class="w-7 h-7 bg-white rounded-full dot-xihai shadow-[0_0_40px_#ffffff] border-2 border-gray-400"></div>
                <span class="marker-label opacity-0 text-white text-sm tracking-widest mt-2 font-bold drop-shadow-md">昆仑之丘</span>
            </div>

        </div>
    </main>

    <!-- ================= 3. 卷宗弹窗 (Modal) ================= -->
    <div id="dossier" class="fixed inset-0 bg-black/90 z-50 justify-center items-center p-8 hidden transition-opacity duration-300" onclick="hideDossier()">
        <div class="bg-neutral-900/90 backdrop-blur-xl border border-gray-500/50 w-full max-w-4xl h-[60vh] flex rounded-lg shadow-[0_0_50px_rgba(255,255,255,0.1)] overflow-hidden transition-all duration-300 opacity-0 scale-95" onclick="event.stopPropagation()">
            
            <div class="w-1/2 h-full bg-black relative flex justify-center items-center overflow-hidden border-r border-neutral-800">
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
                <img id="dossier-image" src="" alt="志怪图像" class="w-full h-full object-cover opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
            </div>

            <div class="w-1/2 p-10 flex flex-col relative">
                <button onclick="hideDossier()" class="absolute top-6 right-6 text-neutral-500 hover:text-white transition text-xl">✕</button>
                <span class="text-gray-400 text-xs tracking-[0.2em] mb-2 uppercase">西荒卷宗</span>
                <h3 id="dossier-title" class="text-4xl font-bold text-white mb-6 tracking-wider"></h3>
                <div class="mb-6 border-b border-neutral-800 pb-4 flex gap-4">
                    <div class="bg-neutral-800 px-3 py-1 rounded text-xs text-neutral-400">
                        相关物类: <span id="dossier-animal" class="text-gray-200 font-bold ml-1"></span>
                    </div>
                </div>
                <div class="flex-grow overflow-y-auto custom-scrollbar pr-2">
                    <p class="text-neutral-400 text-xs tracking-widest mb-2 border-l-2 border-gray-200 pl-2">文献记载</p>
                    <p id="dossier-text" class="text-neutral-300 leading-loose text-sm"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= JavaScript 交互 ================= -->
<!-- ================= JavaScript 交互 ================= -->
    <script>
        // --- 1. 卷宗弹窗逻辑 ---
        const dossier = document.getElementById('dossier');
        const dossierTitle = document.getElementById('dossier-title');
        const dossierAnimal = document.getElementById('dossier-animal');
        const dossierText = document.getElementById('dossier-text');
        const dossierImage = document.getElementById('dossier-image');

        function showDossier(title, animal, text, imgSrc) {
            dossierTitle.textContent = title;
            dossierAnimal.textContent = animal;
            dossierText.textContent = text;
            dossierImage.src = imgSrc;
            
            dossier.classList.remove('hidden');
            dossier.classList.add('flex');
            
            setTimeout(() => {
                const contentDiv = dossier.querySelector('div');
                if(contentDiv) {
                    contentDiv.classList.add('opacity-100', 'scale-100');
                    contentDiv.classList.remove('opacity-0', 'scale-95');
                }
            }, 10);
        }

        function hideDossier() {
            const contentDiv = dossier.querySelector('div');
            if(contentDiv) {
                contentDiv.classList.add('opacity-0', 'scale-95');
                contentDiv.classList.remove('opacity-100', 'scale-100');
            }
            setTimeout(() => {
                dossier.classList.add('hidden');
                dossier.classList.remove('flex');
            }, 300);
        }

        // --- 2. 强力修复版：金色粒子跟随特效 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        // 自动适配窗口大小，确保画布铺满
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particlesArray = [];
        let mouse = { x: null, y: null };

        // 监听鼠标移动
        window.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX; // 使用 clientX/Y 获得绝对坐标
            mouse.y = event.clientY;
            // 每次移动增加粒子数量
            for (let i = 0; i < 2; i++) {
                particlesArray.push(new Particle());
            }
        });

        class Particle {
            constructor() {
                this.x = mouse.x;
                this.y = mouse.y;
                this.size = Math.random() * 3 + 1; // 粒子大小
                this.speedX = Math.random() * 2 - 1; // 横向扩散
                this.speedY = Math.random() * 2 - 1; // 纵向扩散
                this.life = 1; // 寿命
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02; // 消散速度
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; // 让重叠的金色产生亮光感
                ctx.fillStyle = `rgba(206, 162, 98, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                // 移除死亡粒子
                if (particlesArray[i].life <= 0) {
                    particlesArray.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
    </script>
</body>
</html>
